<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-powered fake news detection and analysis system. Classify news articles as real or fake with confidence scoring, sentiment analysis, and source credibility checks.">
    <title>{% block title %}VeritasAI — Fake News Detection{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <div class="brand-icon">🛡️</div>
                <div class="brand-text"><span>VeritasAI</span></div>
            </a>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a href="/" class="{% if request.endpoint == 'main.index' %}active{% endif %}">🔍 Analyze</a></li>
                <li><a href="/dashboard" class="{% if request.endpoint == 'main.dashboard' %}active{% endif %}">📊 Dashboard</a></li>
                <li><a href="/feed" class="{% if request.endpoint == 'main.feed' %}active{% endif %}">📡 Feeds</a></li>
            </ul>
        </div>
    </nav>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}

    <script>
        // Navbar scroll effect
        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('navbar');
            navbar.classList.toggle('scrolled', window.scrollY > 20);
        });

        // Mobile nav toggle
        document.getElementById('navToggle').addEventListener('click', () => {
            document.getElementById('navLinks').classList.toggle('open');
        });
    </script>
</body>
</html>
